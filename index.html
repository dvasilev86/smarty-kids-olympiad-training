<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Arithmetic Worksheet Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Mental Arithmetic Worksheet Generator</h1>

    <label for="difficulty">Select Difficulty:</label>
    <select id="difficulty">
      <option value="easy">NF - no formulas</option>
      <option value="medium">5F - little friends</option>
      <option value="hard">10F - big friends</option>
    </select>

    <button onclick="generate()">Generate Worksheet</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
